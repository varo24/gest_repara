<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReparaPro Unified - Consola Técnica</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="ReparaPro Unified">
    <meta name="description" content="Consola de gestión técnica para talleres de reparación">
    <meta name="theme-color" content="#f5f5f5">

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReparaPro">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Zero-flash guarantee — applied before any JS/React */
        html, body, #root { background-color: #f5f5f5 !important; color: #1a1a1a !important; margin: 0; padding: 0; }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            margin: 0;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #e0e0e0; }
        ::-webkit-scrollbar-thumb { background: #2e7d32; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #1b5e20; }

        .print-only { display: none !important; }

        @media print {
            @page { margin: 0 !important; size: A4 portrait; }
            .no-print { display: none !important; }
            .print-only {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                top: 0 !important; left: 0 !important;
                width: 210mm !important; height: 297mm !important;
                background: white !important;
                margin: 0 !important; padding: 0 !important;
            }
            .a4-print-container {
                width: 210mm !important; height: 297mm !important;
                padding: 10mm !important; background: white !important;
                box-sizing: border-box !important; overflow: hidden !important;
            }
            html, body { background: white !important; width: 210mm !important; height: 297mm !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Registrar Service Worker para PWA/offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.warn('SW no registrado:', err));
        });
      }
    </script>
</body>
</html>
