name: Weekly Firestore Backup

on:
  schedule:
    # Every Sunday at 02:00 UTC (04:00 Spain summer / 03:00 winter)
    - cron: '0 2 * * 0'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  backup:
    name: Backup Firestore → Firebase Storage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backup/package.json

      - name: Install dependencies
        working-directory: backup
        run: npm install

      - name: Run backup
        working-directory: backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE }}
        run: node backup.js
