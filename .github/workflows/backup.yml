name: Backup Firestore semanal

on:
  schedule:
    - cron: '0 3 * * 1'  # Lunes 3:00 AM UTC
  workflow_dispatch:       # También ejecutable manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: backup

      - name: Debug environment
        run: |
          node --version
          echo "Service account length: ${#FIREBASE_SERVICE_ACCOUNT}"
        working-directory: backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Run backup
        run: node backup.js
        working-directory: backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
